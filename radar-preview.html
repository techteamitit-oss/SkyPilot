<!DOCTYPE html>
<html>
<head>
<style>
  body { background: #0d1117; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; }
  .wrap { text-align: center; }
  canvas { border-radius: 50%; }
  h3 { color: #00D4FF; font-size: 12px; margin-top: 12px; letter-spacing: 2px; }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="radar" width="360" height="360"></canvas>
  <h3>RADAR DISPLAY — SKYPILOT FPV</h3>
</div>
<script>
const c = document.getElementById('radar');
const ctx = c.getContext('2d');
const W = 360, cx = W/2, cy = W/2, R = 160;

// Fake data
const heading = 45; // degrees
const vehicle = { lat: 51.5074, lon: -0.1278 };
const home = { lat: 51.5090, lon: -0.1250 };
const waypoints = [
  { lat: 51.5100, lon: -0.1260, idx: 1 },
  { lat: 51.5050, lon: -0.1300, idx: 2 },
  { lat: 51.5085, lon: -0.1320, idx: 3 },
];
const range = 0.005;

function toRadar(lat, lon) {
  const x = cx + (lon - vehicle.lon) / range * R;
  const y = cy - (lat - vehicle.lat) / range * R;
  return { x, y };
}

function draw() {
  // Background
  ctx.save();
  ctx.beginPath();
  ctx.arc(cx, cy, R + 20, 0, Math.PI * 2);
  ctx.fillStyle = '#0d1117';
  ctx.fill();
  ctx.clip();

  // Outer ring
  ctx.beginPath();
  ctx.arc(cx, cy, R, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,212,255,0.4)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Range rings
  for (let i = 1; i <= 3; i++) {
    ctx.beginPath();
    ctx.arc(cx, cy, R * i / 3, 0, Math.PI * 2);
    ctx.strokeStyle = 'rgba(0,212,255,0.12)';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Scale labels
    const distM = (range * (4-i)) * 111320;
    const label = distM >= 1000 ? (distM/1000).toFixed(1)+'km' : distM.toFixed(0)+'m';
    ctx.fillStyle = 'rgba(0,212,255,0.25)';
    ctx.font = '10px Cascadia Code, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(label, cx, cy - R*i/3 + 12);
  }

  // Cross hairs
  ctx.strokeStyle = 'rgba(0,212,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(cx-R, cy); ctx.lineTo(cx+R, cy); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx, cy-R); ctx.lineTo(cx, cy+R); ctx.stroke();

  // Diagonals
  const d = R * 0.707;
  ctx.beginPath(); ctx.moveTo(cx-d, cy-d); ctx.lineTo(cx+d, cy+d); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+d, cy-d); ctx.lineTo(cx-d, cy+d); ctx.stroke();

  // Home marker
  const hp = toRadar(home.lat, home.lon);
  if (Math.abs(hp.x - cx) < R && Math.abs(hp.y - cy) < R) {
    // Glow
    const hg = ctx.createRadialGradient(hp.x, hp.y, 0, hp.x, hp.y, 14);
    hg.addColorStop(0, 'rgba(255,80,80,0.25)');
    hg.addColorStop(1, 'rgba(255,80,80,0)');
    ctx.fillStyle = hg;
    ctx.beginPath(); ctx.arc(hp.x, hp.y, 14, 0, Math.PI*2); ctx.fill();

    // Diamond
    ctx.fillStyle = 'rgba(255,80,80,0.8)';
    ctx.beginPath();
    ctx.moveTo(hp.x, hp.y-7);
    ctx.lineTo(hp.x+5, hp.y);
    ctx.lineTo(hp.x, hp.y+7);
    ctx.lineTo(hp.x-5, hp.y);
    ctx.closePath();
    ctx.fill();

    ctx.fillStyle = 'rgba(255,80,80,0.9)';
    ctx.font = 'bold 9px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('H', hp.x, hp.y - 12);
  }

  // Waypoints
  waypoints.forEach(wp => {
    const p = toRadar(wp.lat, wp.lon);
    if (Math.abs(p.x - cx) > R || Math.abs(p.y - cy) > R) return;

    // Glow
    const g = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, 12);
    g.addColorStop(0, 'rgba(0,212,255,0.2)');
    g.addColorStop(1, 'rgba(0,212,255,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(p.x, p.y, 12, 0, Math.PI*2); ctx.fill();

    // Circle
    ctx.beginPath();
    ctx.arc(p.x, p.y, 5, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(0,212,255,0.8)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Dot
    ctx.fillStyle = '#00D4FF';
    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();

    // Label
    ctx.fillStyle = '#00D4FF';
    ctx.font = 'bold 9px Segoe UI';
    ctx.textAlign = 'left';
    ctx.fillText(wp.idx, p.x + 8, p.y + 3);
  });

  // Cardinal labels
  ctx.font = 'bold 11px Segoe UI';
  ctx.textAlign = 'center';
  ctx.fillStyle = 'rgba(255,60,60,0.9)';
  ctx.fillText('N', cx, cy - R - 8);
  ctx.fillStyle = 'rgba(0,212,255,0.8)';
  ctx.fillText('E', cx + R + 10, cy + 4);
  ctx.fillStyle = 'rgba(200,200,200,0.7)';
  ctx.fillText('S', cx, cy + R + 14);
  ctx.fillStyle = 'rgba(0,212,255,0.8)';
  ctx.fillText('W', cx - R - 10, cy + 4);

  // Vehicle marker (center triangle)
  ctx.fillStyle = '#00D4FF';
  ctx.beginPath();
  ctx.moveTo(cx, cy - 8);
  ctx.lineTo(cx - 5, cy + 4);
  ctx.lineTo(cx + 5, cy + 4);
  ctx.closePath();
  ctx.fill();

  // Vehicle glow
  const vg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 14);
  vg.addColorStop(0, 'rgba(0,212,255,0.3)');
  vg.addColorStop(1, 'rgba(0,212,255,0)');
  ctx.fillStyle = vg;
  ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#00D4FF';
  ctx.beginPath();
  ctx.moveTo(cx, cy - 8);
  ctx.lineTo(cx - 5, cy + 4);
  ctx.lineTo(cx + 5, cy + 4);
  ctx.closePath();
  ctx.fill();

  // Range text
  ctx.fillStyle = 'rgba(0,212,255,0.4)';
  ctx.font = '10px Segoe UI';
  ctx.textAlign = 'left';
  const maxDist = range * 3 * 111320;
  ctx.fillText('Range: ' + (maxDist >= 1000 ? (maxDist/1000).toFixed(1)+'km' : maxDist.toFixed(0)+'m'), 8, W - 8);

  ctx.restore();
}

draw();
</script>
</body>
</html>
